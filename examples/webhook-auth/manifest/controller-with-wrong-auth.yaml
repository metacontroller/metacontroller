---
# Wrong bearer token — the server will return 401 for every request from this
# controller, so the child secret is never created.
apiVersion: v1
kind: Secret
metadata:
  name: webhook-auth-wrong-token
  namespace: metacontroller
stringData:
  token: wrong-token
---
apiVersion: metacontroller.k8s.io/v1alpha1
kind: CompositeController
metadata:
  name: webhook-auth-controller-invalid
spec:
  generateSelector: true
  parentResource:
    apiVersion: examples.metacontroller.io/v1alpha1
    resource: securesecretpropagations
    labelSelector:
      matchLabels:
        auth: invalid
  childResources:
  - apiVersion: v1
    resource: secrets
    updateStrategy:
      method: InPlace
  endpointConfigs:
  - host: webhook-auth-controller.metacontroller
    caBundle:
      configMapRef:
        name: webhook-auth-ca
        namespace: metacontroller
        key: ca.crt
    authorization:
      type: Bearer
      secretRef:
        name: webhook-auth-wrong-token
        namespace: metacontroller
        key: token
    clientTLS:
      secretRef:
        name: webhook-auth-client
        namespace: metacontroller
      certKey: tls.crt
      privateKeyKey: tls.key
  hooks:
    sync:
      webhook:
        url: https://webhook-auth-controller.metacontroller/sync
    customize:
      webhook:
        url: https://webhook-auth-controller.metacontroller/customize
